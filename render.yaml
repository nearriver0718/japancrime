services:
  - type: web
    name: japancrime
    runtime: node
    plan: free  # 無料プラン（15分アクセスなしでスリープ。AdSense有効化時はstarterに変更）
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SITE_URL
        value: https://japancrime.onrender.com
    autoDeploy: true
    healthCheckPath: /api/stats
